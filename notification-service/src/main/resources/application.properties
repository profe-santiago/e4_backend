spring.application.name=notification-service
# Servidor
server.port=${SERVER_PORT}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# SpringDoc / Swagger
springdoc.api-docs.path=/api/schema
springdoc.swagger-ui.path=/api/docs

# App info
app.name=${APP_NAME}
app.description=${APP_DESCRIPTION}
app.version=${APP_VERSION}

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Exchange
app.rabbitmq.exchange=tickets.topic.exchange
app.rabbitmq.dlx=tickets.dlx

# Queues que consume notification-service
app.rabbitmq.queues.order-confirmed=order.confirmed.notification.queue
app.rabbitmq.queues.payment-completed=payment.completed.notification.queue
app.rabbitmq.queues.order-cancelled=order.cancelled.notification.queue

# Routing keys (deben coincidir con los publishers)
app.rabbitmq.routing-keys.order-confirmed=order.confirmed
app.rabbitmq.routing-keys.payment-completed=payment.completed
app.rabbitmq.routing-keys.order-cancelled=order.cancelled

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@tickets.com}

# Inter-service HTTP clients
app.services.user-service.url=${USER_SERVICE_URL:http://localhost:8081}
