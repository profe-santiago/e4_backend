spring.application.name=event-service
# Servidor
server.port=${SERVER_PORT}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# SpringDoc / Swagger
springdoc.api-docs.path=/api/schema
springdoc.swagger-ui.path=/api/docs

# App info
app.name=${APP_NAME}
app.description=${APP_DESCRIPTION}
app.version=${APP_VERSION}

# JWT (mismo secret que auth-service)
app.jwt.secret=${JWT_SECRET}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Multipart (subida de imágenes)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Exchange (debe coincidir con ticket-service)
app.rabbitmq.exchange=tickets.topic.exchange
app.rabbitmq.dlx=tickets.dlx

# Queues (event-service consume)
app.rabbitmq.queues.stock-reserve=stock.reserve.queue
app.rabbitmq.queues.order-cancelled=order.cancelled.event.queue
app.rabbitmq.queues.order-refunded=order.refunded.event.queue

# Routing keys (deben coincidir con ticket-service)
app.rabbitmq.routing-keys.stock-reserve=stock.reserve
app.rabbitmq.routing-keys.stock-reserved=stock.reserved
app.rabbitmq.routing-keys.stock-failed=stock.failed
app.rabbitmq.routing-keys.order-cancelled=order.cancelled
app.rabbitmq.routing-keys.order-refunded=order.refunded

# RabbitMQ listener retry — 3 intentos con backoff, luego manda a DLQ
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.default-requeue-rejected=false
