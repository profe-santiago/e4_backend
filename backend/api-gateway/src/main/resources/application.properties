# Application
spring.application.name=api-gateway
server.port=8080

# Gateway routes configuration
# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8090}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=authServiceCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/auth

# User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8081}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=userServiceCircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/user

# Event Service
spring.cloud.gateway.routes[2].id=event-service
spring.cloud.gateway.routes[2].uri=http://${EVENT_SERVICE_HOST:localhost}:${EVENT_SERVICE_PORT:8082}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/events/**, /api/v1/categories/**
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=eventServiceCircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/event

# Ticket Service
spring.cloud.gateway.routes[3].id=ticket-service
spring.cloud.gateway.routes[3].uri=http://${TICKET_SERVICE_HOST:localhost}:${TICKET_SERVICE_PORT:8083}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/orders/**, /api/v1/tickets/**
spring.cloud.gateway.routes[3].filters[0]=CircuitBreaker
spring.cloud.gateway.routes[3].filters[0].args.name=ticketServiceCircuitBreaker
spring.cloud.gateway.routes[3].filters[0].args.fallbackUri=forward:/fallback/ticket

# Payment Service
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=http://${PAYMENT_SERVICE_HOST:localhost}:${PAYMENT_SERVICE_PORT:8084}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/payments/**
spring.cloud.gateway.routes[4].filters[0]=CircuitBreaker
spring.cloud.gateway.routes[4].filters[0].args.name=paymentServiceCircuitBreaker
spring.cloud.gateway.routes[4].filters[0].args.fallbackUri=forward:/fallback/payment

# Redis configuration for rate limiting
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000

# JWT configuration
jwt.secret=${JWT_SECRET:your-secret-key-min-256-bits-for-hs256-algorithm-security}

# Resilience4j Circuit Breaker configuration
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.authServiceCircuitBreaker.slowCallDurationThreshold=2s

resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.slowCallDurationThreshold=2s

resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.slowCallDurationThreshold=2s

resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.ticketServiceCircuitBreaker.slowCallDurationThreshold=2s

resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.slowCallDurationThreshold=2s

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,circuitbreakers,ratelimiters
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Rate Limiting Configuration
# General rate limit: 1000 requests per minute per IP
rate.limit.default.replenishRate=1000
rate.limit.default.burstCapacity=2000
rate.limit.default.requestedTokens=1

# Authenticated user rate limit: 2000 requests per minute per user
rate.limit.authenticated.replenishRate=2000
rate.limit.authenticated.burstCapacity=5000
rate.limit.authenticated.requestedTokens=1

# Order creation endpoint: 500 requests per minute per user
rate.limit.order.replenishRate=500
rate.limit.order.burstCapacity=1000
rate.limit.order.requestedTokens=1

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.tickets.api_gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
