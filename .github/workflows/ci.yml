name: CI

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - event-service
          - ticket-service
          - user-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run tests with coverage
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/jacoco/test/html/

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        service:
          - auth-service
          - event-service
          - ticket-service
          - user-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build JAR
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: echo "Railway deploy — configurar RAILWAY_TOKEN en secrets"
