name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - event-service
          - ticket-service
          - user-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run tests with coverage
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/jacoco/test/html/

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        service:
          - auth-service
          - event-service
          - ticket-service
          - user-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build JAR
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

  e2e:
    name: E2E Tests (Integration)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for CI
        working-directory: backend
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          {
            echo "DB_USER=testuser"
            echo "DB_PASSWORD=testpassword123"
            echo "JWT_SECRET=ci-testing-secret-key-minimum-32-characters-long"
            echo "JWT_EXPIRATION_MS=86400000"
            echo "RABBITMQ_USER=guest"
            echo "RABBITMQ_PASS=guest"
            echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}"
            echo "CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}"
            echo "CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}"
            echo "CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}"
            echo "MAIL_HOST=smtp.gmail.com"
            echo "MAIL_PORT=587"
            echo "MAIL_USERNAME=noreply@test.com"
            echo "MAIL_PASSWORD=dummy-password"
            echo "MAIL_FROM=noreply@tickets.com"
          } > .env

      - name: Start all services
        working-directory: backend
        run: docker compose up -d --build

      - name: Wait for API Gateway to be healthy
        run: |
          for i in {1..20}; do
            STATUS=$(curl --silent --max-time 10 http://localhost:8080/actuator/health || true)
            if echo "$STATUS" | grep -q '"status":"UP"'; then
              echo "Servicios listos en el intento $i"
              exit 0
            fi
            echo "Intento $i/20 — esperando 30s..."
            sleep 30
          done
          echo "Los servicios no levantaron en 10 minutos"
          docker compose -f backend/docker-compose.yml logs --tail=50
          exit 1

      - name: Wait for auth-service to be ready
        run: |
          for i in {1..15}; do
            CODE=$(curl --silent --max-time 10 -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8080/api/v1/auth/register \
              -H "Content-Type: application/json" \
              -d '{"email":"probe@ci.com","password":"Probe123!"}')
            if [ "$CODE" = "201" ] || [ "$CODE" = "409" ]; then
              echo "Auth service listo (status: $CODE)"
              exit 0
            fi
            echo "Intento $i/15 — auth devuelve $CODE, esperando 20s..."
            sleep 20
          done
          echo "Auth service no respondió en 5 minutos"
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r backend/tests/requirements.txt

      - name: Run E2E tests
        run: pytest backend/tests/test_microservices.py -v

      - name: Show service logs on failure
        if: failure()
        working-directory: backend
        run: docker compose logs --tail=100

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment health
        run: |
          echo "Esperando a que Railway complete el deploy..."
          for i in {1..10}; do
            STATUS=$(curl --silent --max-time 10 https://api-gateway-production-6c9a.up.railway.app/actuator/health || true)
            if echo "$STATUS" | grep -q '"status":"UP"'; then
              echo "Deploy verificado — API Gateway está UP."
              exit 0
            fi
            echo "Intento $i/10 — gateway no responde aún, esperando 30s..."
            sleep 30
          done
          echo "El gateway no respondió después de 5 minutos."
          exit 1
