name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - event-service
          - ticket-service
          - user-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run tests with coverage
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/jacoco/test/html/

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        service:
          - auth-service
          - event-service
          - ticket-service
          - user-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build JAR
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment health
        run: |
          echo "Esperando a que Railway complete el deploy..."
          for i in {1..10}; do
            STATUS=$(curl --silent --max-time 10 https://api-gateway-production-6c9a.up.railway.app/actuator/health || true)
            if echo "$STATUS" | grep -q '"status":"UP"'; then
              echo "Deploy verificado — API Gateway está UP."
              exit 0
            fi
            echo "Intento $i/10 — gateway no responde aún, esperando 30s..."
            sleep 30
          done
          echo "El gateway no respondió después de 5 minutos."
          exit 1
