spring.application.name=payment-service
# Servidor
server.port=${SERVER_PORT}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# SpringDoc / Swagger
springdoc.api-docs.path=/api/schema
springdoc.swagger-ui.path=/api/docs

# App info
app.name=${APP_NAME}
app.description=${APP_DESCRIPTION}
app.version=${APP_VERSION}

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Exchange compartido con todos los servicios
app.rabbitmq.exchange=tickets.topic.exchange
app.rabbitmq.dlx=tickets.dlx

# Queues (payment-service consumes)
app.rabbitmq.queues.order-confirmed=order.confirmed.payment.queue

# Routing keys
app.rabbitmq.routing-keys.order-confirmed=order.confirmed
app.rabbitmq.routing-keys.payment-completed=payment.completed
app.rabbitmq.routing-keys.payment-failed=payment.failed

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
